<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'self'; script-src 'self'; connect-src ws:" />
  <title>Live Caption Transcript</title>
  <link rel="stylesheet" href="overlay.css" />
</head>

<body>
  <div id="root">
    <div id="subtitle-box" class="hidden">
      <div id="source" class="line"></div>
      <div id="translated" class="line"></div>
    </div>
  </div>
  <div id="settings-panel" class="hidden">
    <div class="panel-title">Settings</div>
    <label>Width <input id="setting-width" type="number" step="1" min="0" /></label>
    <label class="checkline"><input id="setting-show-source" type="checkbox" />Show Source</label>
    <label>Source Font Size <input id="setting-source-font-size" type="number" step="1" min="0" /></label>
    <label>Translated Font Size <input id="setting-translated-font-size" type="number" step="1" min="0" /></label>
    <label>Source Text Color <input id="setting-text-color" type="color" /></label>
    <label>Translated Text Color <input id="setting-translate-color" type="color" /></label>
    <label>Background Color <input id="setting-background-color" type="color" /></label>
    <label>Background Opacity <input id="setting-background-alpha" type="range" min="0" max="100" step="1" /></label>
    <label>Max Lines <input id="setting-max-lines" type="number" step="1" min="0" /></label>
    <label>Silence Clear (ms) <input id="setting-silence-clear" type="number" min="0" /></label>
    <label><input id="setting-keep-onscreen" type="checkbox" />Keep Onscreen</label>
    <label>Play/Pause</label>
  </div>
  <script src="./overlay.js"></script>
</body>

</html>
