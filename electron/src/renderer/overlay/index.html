<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'self'; script-src 'self'; connect-src ws:" />
  <title>App Lang Overlay</title>
  <link rel="stylesheet" href="overlay.css" />
</head>

<body>
  <div id="root" class="anchor">
    <div id="subtitle-box" class="hidden">
      <div id="source" class="line source"></div>
      <div id="translated" class="line translated"></div>
    </div>
  </div>
  <div id="settings-panel" class="hidden">
    <div class="panel-title">Overlay Settings</div>
    <label>Offset X <input id="setting-offset-x" type="number" step="1" /></label>
    <label>Offset Y <input id="setting-offset-y" type="number" step="1" /></label>
    <label>Width <input id="setting-width" type="number" step="1" min="0" /></label>
    <label>Font Size <input id="setting-font-size" type="number" step="1" min="0" /></label>
    <label>Source Text Color <input id="setting-text-color" type="color" /></label>
    <label>Translated Text Color <input id="setting-translate-color" type="color" /></label>
    <label>Background Color <input id="setting-background-color" type="color" /></label>
    <label>Background Opacity <input id="setting-background-alpha" type="range" min="0" max="100" step="1" /></label>
    <label>Auto Hide (ms) <input id="setting-autohide" type="number" step="100" min="300" /></label>
    <label>Dedupe (ms) <input id="setting-dedupe" type="number" step="100" min="0" /></label>
    <label>OCR Input Language
      <select id="setting-ocr-lang">
        <option value="en">English (en)</option>
        <option value="japan">Japanese (japan)</option>
        <option value="ch">Chinese Simplified (ch)</option>
        <option value="chinese_cht">Chinese Traditional (chinese_cht)</option>
        <option value="korean">Korean (korean)</option>
      </select>
    </label>
    <label class="checkline"><input id="setting-clickthrough" type="checkbox" /> Clickthrough</label>
  </div>
  <script src="./overlay.js"></script>
</body>

</html>
